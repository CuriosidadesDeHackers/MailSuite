<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="400" viewBox="0 0 1280 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020817"/>
      <stop offset="50%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#020817"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1d4ed8"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:0"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="25"/>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#3b82f6" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="400" fill="url(#bg)"/>

  <!-- Glow blobs -->
  <ellipse cx="250" cy="200" rx="300" ry="200" fill="#1d4ed8" opacity="0.08" filter="url(#blur1)"/>
  <ellipse cx="1050" cy="180" rx="280" ry="180" fill="#3b82f6" opacity="0.07" filter="url(#blur1)"/>
  <ellipse cx="640" cy="350" rx="400" ry="120" fill="#2563eb" opacity="0.06" filter="url(#blur2)"/>

  <!-- Grid lines (subtle) -->
  <g stroke="#1e3a5f" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="50" x2="1280" y2="50"/>
    <line x1="0" y1="100" x2="1280" y2="100"/>
    <line x1="0" y1="150" x2="1280" y2="150"/>
    <line x1="0" y1="200" x2="1280" y2="200"/>
    <line x1="0" y1="250" x2="1280" y2="250"/>
    <line x1="0" y1="300" x2="1280" y2="300"/>
    <line x1="0" y1="350" x2="1280" y2="350"/>
    <line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="500" y1="0" x2="500" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="700" y1="0" x2="700" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="900" y1="0" x2="900" y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
    <line x1="1100" y1="0" x2="1100" y2="400"/>
    <line x1="1200" y1="0" x2="1200" y2="400"/>
  </g>

  <!-- Floating envelope icons (decorative, left side) -->
  <g opacity="0.07" fill="#3b82f6">
    <rect x="60" y="60" width="80" height="56" rx="6"/>
    <polyline points="60,60 100,95 140,60" fill="none" stroke="#3b82f6" stroke-width="3" opacity="0.07"/>
  </g>
  <g opacity="0.05" fill="#3b82f6">
    <rect x="120" y="280" width="50" height="35" rx="4"/>
  </g>

  <!-- Floating envelope icons (decorative, right side) -->
  <g opacity="0.07" fill="#3b82f6">
    <rect x="1140" y="100" width="80" height="56" rx="6"/>
  </g>
  <g opacity="0.05" fill="#3b82f6">
    <rect x="1090" y="290" width="50" height="35" rx="4"/>
  </g>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1280" height="3" fill="url(#accent)"/>

  <!-- Center logo icon -->
  <g transform="translate(590, 90)" filter="url(#shadow)">
    <!-- Logo box -->
    <rect width="100" height="100" rx="22" fill="#1d4ed8"/>
    <rect width="100" height="100" rx="22" fill="url(#glow)"/>
    <!-- Envelope shape inside logo -->
    <rect x="18" y="30" width="64" height="44" rx="5" fill="none" stroke="white" stroke-width="3"/>
    <polyline points="18,30 50,58 82,30" fill="none" stroke="white" stroke-width="3" stroke-linejoin="round"/>
    <!-- Signal dots -->
    <circle cx="50" cy="18" r="4" fill="#60a5fa"/>
    <circle cx="62" cy="14" r="3" fill="#93c5fd" opacity="0.7"/>
    <circle cx="73" cy="9" r="2.5" fill="#bfdbfe" opacity="0.5"/>
  </g>

  <!-- Main title -->
  <text x="640" y="232" font-family="'Segoe UI', Arial, sans-serif" font-size="72" font-weight="800" fill="white" text-anchor="middle" letter-spacing="-1">MailSuite</text>

  <!-- Accent underline -->
  <rect x="490" y="244" width="300" height="3" rx="2" fill="url(#accent)"/>

  <!-- Tagline -->
  <text x="640" y="285" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="400" fill="#94a3b8" text-anchor="middle" letter-spacing="0.5">Panel de administración para tu servidor de correo propio</text>

  <!-- Tech pills -->
  <g font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="600">
    <!-- Postfix -->
    <rect x="298" y="320" width="90" height="28" rx="14" fill="#1e3a5f" stroke="#2563eb" stroke-width="1"/>
    <text x="343" y="338" fill="#60a5fa" text-anchor="middle">Postfix</text>
    <!-- Dovecot -->
    <rect x="400" y="320" width="90" height="28" rx="14" fill="#1e3a5f" stroke="#2563eb" stroke-width="1"/>
    <text x="445" y="338" fill="#60a5fa" text-anchor="middle">Dovecot</text>
    <!-- Rspamd -->
    <rect x="502" y="320" width="90" height="28" rx="14" fill="#1e3a5f" stroke="#2563eb" stroke-width="1"/>
    <text x="547" y="338" fill="#60a5fa" text-anchor="middle">Rspamd</text>
    <!-- Django -->
    <rect x="604" y="320" width="90" height="28" rx="14" fill="#1e3a5f" stroke="#2563eb" stroke-width="1"/>
    <text x="649" y="338" fill="#60a5fa" text-anchor="middle">Django</text>
    <!-- React -->
    <rect x="706" y="320" width="90" height="28" rx="14" fill="#1e3a5f" stroke="#2563eb" stroke-width="1"/>
    <text x="751" y="338" fill="#60a5fa" text-anchor="middle">React</text>
    <!-- DKIM -->
    <rect x="808" y="320" width="90" height="28" rx="14" fill="#1e3a5f" stroke="#2563eb" stroke-width="1"/>
    <text x="853" y="338" fill="#60a5fa" text-anchor="middle">DKIM</text>
  </g>

  <!-- Bottom line -->
  <rect x="0" y="397" width="1280" height="3" fill="url(#accent)" opacity="0.5"/>
</svg>
